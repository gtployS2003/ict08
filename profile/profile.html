<!DOCTYPE html>
<html lang="th">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<link rel="icon" type="image/png" href="/ict8/assets/image/logo_หน่วย8.png" />
	<title>ข้อมูลส่วนตัว</title>

	<link rel="stylesheet" href="/ict8/assets/css/request-form.css" />
	<link rel="stylesheet" href="/ict8/assets/css/profile.css" />

	<!-- config -->
	<script src="/ict8/backend/public/config.js.php" defer></script>

	<!-- LIFF SDK (อย่า defer) -->
	<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

	<!-- core scripts -->
	<script src="/ict8/assets/js/include.js" defer></script>
	<script src="/ict8/assets/js/auth.js" defer></script>
	<script src="/ict8/assets/js/main.js" defer></script>
	<script src="/ict8/assets/js/api/http.js" defer></script>

	<!-- page script -->
	<script src="/ict8/assets/js/profile.js" defer></script>
</head>

<body>
	<div id="header-form"></div>

	<main class="request-form-page">
		<div class="request-form-container">
			<div class="request-form-card">
				<div class="request-form-card-header">
					<div class="pf-topbar">
						<div>
							<div class="request-form-card-title">ข้อมูลส่วนตัว</div>
							<div class="request-form-card-subtitle">เพิ่ม / แก้ไข / ลบข้อมูลส่วนตัวของคุณ (เชื่อมกับบัญชี LINE)</div>
						</div>

						<div class="pf-actions" aria-label="ปุ่มการทำงาน">
							<a class="request-form-btn request-form-btn-ghost" href="/ict8/profile/history-event.html">ดูประวัติ (เสร็จสิ้น)</a>
							<button id="btn-logout" class="request-form-btn request-form-btn-ghost" type="button">ออกจากระบบ (LINE)</button>
						</div>
					</div>
				</div>

				<div class="pf-profile-header">
					<div class="pf-avatar" aria-label="รูปโปรไฟล์">
						<img id="pf-photo" alt="รูปโปรไฟล์" style="display:none;" />
						<div id="pf-photo-fallback" class="pf-avatar-fallback">PROFILE</div>
					</div>

					<div class="pf-who">
						<div id="pf-name" class="pf-name">กำลังโหลด...</div>
						<div id="pf-sub" class="pf-sub"></div>
						<div id="pf-chip" class="pf-chip">LINE: -</div>
					</div>
				</div>

				<div id="pf-info" class="request-form-info-box" style="display:none;"></div>

				<form id="profile-form" class="request-form-form">
					<input type="hidden" id="photo_clear" name="photo_clear" value="0" />

					<div class="request-form-grid">

						<div class="request-form-field">
							<label class="request-form-label" for="person_prefix_id">คำนำหน้าชื่อ <span class="request-form-req">*</span></label>
							<select class="request-form-select" id="person_prefix_id" name="person_prefix_id" required>
								<option value="">-- กรุณาเลือก --</option>
							</select>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="display_name">display_name</label>
							<input class="request-form-input" id="display_name" name="display_name" type="text" placeholder="เช่น สมชาย ใจดี" />
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="first_name_th">first_name_th <span class="request-form-req">*</span></label>
							<input class="request-form-input" id="first_name_th" name="first_name_th" type="text" autocomplete="given-name" required />
							<div class="request-form-hint">ชื่อจริงภาษาไทย</div>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="last_name_th">last_name_th <span class="request-form-req">*</span></label>
							<input class="request-form-input" id="last_name_th" name="last_name_th" type="text" autocomplete="family-name" required />
							<div class="request-form-hint">นามสกุลภาษาไทย</div>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="first_name_en">first_name_en</label>
							<input class="request-form-input" id="first_name_en" name="first_name_en" type="text" placeholder="Optional" />
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="last_name_en">last_name_en</label>
							<input class="request-form-input" id="last_name_en" name="last_name_en" type="text" placeholder="Optional" />
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="organization_id">organization_id <span class="request-form-req">*</span></label>
							<select class="request-form-select" id="organization_id" name="organization_id" required>
								<option value="">-- กรุณาเลือก --</option>
							</select>
			
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="department_id">department_id <span class="request-form-req">*</span></label>
							<select class="request-form-select" id="department_id" name="department_id" required>
								<option value="">-- กรุณาเลือก --</option>
							</select>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="position_title_id">position_title_id <span class="request-form-req">*</span></label>
							<select class="request-form-select" id="position_title_id" name="position_title_id" required>
								<option value="">-- กรุณาเลือก --</option>
							</select>
						</div>

						<div class="request-form-field request-form-span-2">
							<label class="request-form-label" for="photo_file">รูปโปรไฟล์ (photo_path / upload)</label>
							<div class="pf-photo-actions">
								<input class="request-form-input" id="photo_file" name="photo_file" type="file" accept="image/*" />
								<button id="btn-clear-photo" class="request-form-btn request-form-btn-ghost" type="button">ลบรูป</button>
							</div>
							<div class="request-form-hint">รองรับ .jpg .png .webp (ไม่เกิน 3MB)</div>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="create_at">create_at</label>
							<input class="request-form-input pf-muted-input" id="create_at" name="create_at" type="text" readonly />
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="start_date">start_date</label>
							<input class="request-form-input" id="start_date" name="start_date" type="datetime-local" />
							<div class="request-form-hint">ถ้าไม่ระบุจะเป็นค่าว่าง</div>
						</div>

						<div class="request-form-field">
							<label class="request-form-label" for="end_date">end_date</label>
							<input class="request-form-input" id="end_date" name="end_date" type="datetime-local" />
							<div class="request-form-hint">ถ้ามีวันสิ้นสุด/หมดอายุให้ระบุได้</div>
						</div>
					</div>

					<div class="request-form-actions">
						<button id="btn-delete" class="request-form-btn request-form-btn-ghost request-form-btn-danger" type="button">ลบบัญชี/ข้อมูล</button>
						<button id="btn-save" class="request-form-btn request-form-btn-primary" type="submit">บันทึกข้อมูล</button>
					</div>

				
				</form>
			</div>
		</div>
	</main>

	<div id="footer-index"></div>
</body>

</html>
